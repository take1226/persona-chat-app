name: Proactive Message Cron

on:
  schedule:
    # 15分ごと (UTC) — GitHub Actions の最小単位
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-scheduled endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/push/send-scheduled"
