name: Proactive Message Cron

# スケジュール実行は Vercel ネイティブ cron (vercel.json) に移管済み。
# Vercel cron は deployment protection を素通りするため外部 HTTP 認証不要。
# このワークフローは手動検証・デバッグ専用として残す。
on:
  workflow_dispatch: {}

# 必要な GitHub Secrets (Settings → Secrets → Actions):
#   CRON_SECRET      - Vercel 環境変数 CRON_SECRET と同じ値
#   APP_URL          - https://persona-chat-app-t-s-projects10.vercel.app
#   VERCEL_BYPASS_TOKEN - Vercel ダッシュボード → Deployment Protection
#                        → Protection Bypass for Automation で発行

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call send-scheduled endpoint
        run: |
          STATUS=$(curl -s \
            -o /tmp/response_body.txt \
            -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_TOKEN }}" \
            "${{ secrets.APP_URL }}/api/push/send-scheduled")
          echo "HTTP status: $STATUS"
          echo "Response body:"
          cat /tmp/response_body.txt || true
          if [ "$STATUS" != "200" ]; then
            echo "::error::Endpoint returned HTTP $STATUS — expected 200."
            echo "Hint: if 302, set VERCEL_BYPASS_TOKEN (Vercel → Deployment Protection → Bypass for Automation)."
            echo "Hint: if 401, ensure CRON_SECRET in Vercel env vars matches the GitHub Secret value."
            exit 1
          fi
